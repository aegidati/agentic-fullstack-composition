id: agentic-fullstack-composition
name: Agentic Fullstack Composition
version: 0.1.0
type: composition

installsInto: app/composition

ownedPaths:
  - app/composition

dependencies: []

optionalDependencies:
  - agentic-clean-backend
  - agentic-react-spa
  - agentic-flutter-client
  - agentic-api-contracts-api
  - agentic-postgres-dev

provides:
  - local-runtime-composition
  - fullstack-orchestration-foundation
  - service-composition-structure

requires:
  - docker
  - docker-compose

postInstallChecks:
  - composition directory exists
  - composition files are present
  - compose configuration is valid
  - local startup command is valid

tags:
  - agentic
  - starter
  - composition
  - docker
  - orchestration
  - fullstack
